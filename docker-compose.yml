version: "3.8"

services:
  # PostgreSQL 数据库
  db:
    image: postgres:15-alpine
    container_name: wms-db
    environment:
      POSTGRES_USER: wms
      POSTGRES_PASSWORD: wms123456
      POSTGRES_DB: wms_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wms -d wms_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: wms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # FastAPI 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wms-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://wms:wms123456@db:5432/wms_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=wms-secret-key-change-in-production
      - DEBUG=true
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wms-celery
    environment:
      - DATABASE_URL=postgresql+asyncpg://wms:wms123456@db:5432/wms_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=wms-secret-key-change-in-production
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - db
    command: celery -A app.tasks worker --loglevel=info

volumes:
  postgres_data:
  redis_data:
